# version: "3.8"

services:
  central_db:
    image: postgres:16
    container_name: schema_mapper_central_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: central
    ports:
      - "5433:5432"
    volumes:
      - central_db_data:/var/lib/postgresql/data
      - ./sql/central_db_init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./sql/001_integration_foundation.sql:/docker-entrypoint-initdb.d/02_integration.sql
      - ./sql/002_onboarding_metadata.sql:/docker-entrypoint-initdb.d/03_onboarding.sql
      - ./sql/003_admin_ui.sql:/docker-entrypoint-initdb.d/04_admin.sql
      - ./sql/004_schema_scope_isolation.sql:/docker-entrypoint-initdb.d/05_schema_scope.sql
      - ./sql/005_crosswalk_target_table.sql:/docker-entrypoint-initdb.d/06_crosswalk.sql
      - ./sql/006_station_id_sequence.sql:/docker-entrypoint-initdb.d/07_id_sequence.sql
      - ./sql/007_onboarding_target_tables.sql:/docker-entrypoint-initdb.d/08_target_tables.sql
      - ./sql/008_target_ddl_scope.sql:/docker-entrypoint-initdb.d/09_target_ddl_scope.sql
      - ./sql/009_drift_resolution.sql:/docker-entrypoint-initdb.d/10_drift_resolution.sql
      - ./sql/010_three_way_drift.sql:/docker-entrypoint-initdb.d/11_three_way_drift.sql
      - ./sql/011_recovery.sql:/docker-entrypoint-initdb.d/12_recovery.sql
      - ./sql/012_entity_source_contract.sql:/docker-entrypoint-initdb.d/13_entity_source_contract.sql
      - ./sql/013_agent_conversation.sql:/docker-entrypoint-initdb.d/14_agent_conversation.sql
      - ./sql/014_refresh_schedule.sql:/docker-entrypoint-initdb.d/15_refresh_schedule.sql
      # Sample-data CDC trigger, split out of 001 (see sql/demo_customer_cdc.sql).
      # Runs last: it depends on integration.outbox and the enum types above.
      - ./sql/demo_customer_cdc.sql:/docker-entrypoint-initdb.d/16_demo_customer_cdc.sql

  lrmis_staging_db:
    image: mysql:8.4
    container_name: schema_mapper_lrmis_staging
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lrmis_staging
      MYSQL_USER: irimsv_writer
      MYSQL_PASSWORD: change-me
    ports:
      - "3307:3306"
    volumes:
      - lrmis_staging_data:/var/lib/mysql
      - ./sql/lrmis_staging_init.sql:/docker-entrypoint-initdb.d/01_staging.sql

  # Postgres "old-lrmis" delivery target (generic-engine schema swap). Restored
  # from lrmis_db/old-lrmis.backup (PGDMP, schema `lrmis`, 66 tables). Ports
  # 5433/5440 are taken by central/real_source, so this uses 5442.
  oldlrmis_target_db:
    image: postgres:17
    container_name: schema_mapper_oldlrmis_target
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oldlrmis
    ports:
      - "5442:5432"
    volumes:
      - oldlrmis_target_data:/var/lib/postgresql/data

volumes:
  central_db_data:
  lrmis_staging_data:
  oldlrmis_target_data:
